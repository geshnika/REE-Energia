name: Daily REE Load

on:
  schedule:
    - cron: '0 6 * * *'    # Cada día a las 06:00 UTC (08:00 Madrid)
  workflow_dispatch:       # Permite ejecutarlo manualmente desde GitHub

jobs:
  load:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas sqlalchemy pyodbc python-dotenv

      - name: Install ODBC Driver
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --batch --no-tty --dearmor \
            | sudo tee /usr/share/keyrings/microsoft-prod.gpg > /dev/null
          curl -fsSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Run daily load
        run: |
          for i in 1 2; do
            python Python/REE_Daily.py && break
            echo "Intento $i fallido, reintentando en 30s..."
            sleep 30
          done
        env:
          DB_SERVER:   ${{ secrets.DB_SERVER }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Update README
        run: python Python/update_readme.py
        env:
          DB_SERVER:   ${{ secrets.DB_SERVER }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Update RESULTS
        run: python Python/update_results.py
        env:
          DB_SERVER:   ${{ secrets.DB_SERVER }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Commit README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- README.md RESULTS.md 2>/dev/null || true
          git add README.md RESULTS.md
          git diff --staged --quiet || git commit -m "docs: update Data Coverage table"
          git push origin main
