name: Daily REE Load

on:
  schedule:
    - cron: '0 6 * * *'    # Cada día a las 06:00 UTC (08:00 Madrid)
  workflow_dispatch:       # Permite ejecutarlo manualmente desde GitHub

jobs:
  load:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas sqlalchemy pyodbc python-dotenv

      - name: Install ODBC Driver
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --batch --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Run daily load
        run: python python/REE_Daily.py
        env:
          DB_SERVER:   ${{ secrets.DB_SERVER }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}